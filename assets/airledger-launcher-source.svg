<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Launcher icon source — 1024x1024. Dark background (oxy palette
    #0A0A0A) with the airledger mark in near-white (#F5F5F5),
    centered and scaled to ~50% of the canvas. Fed to
    flutter_launcher_icons by brand.dart to produce all density buckets.
  -->
  <rect width="1024" height="1024" fill="#0A0A0A"/>
  <g transform="translate(192, 192) scale(8.421)">
    <!-- mark recentred + scaled: 76 * 8.421 = ~640px stack, fits 1024-192-192 = 640 -->
    <rect x="14" y="14" width="48" height="12" rx="6" fill="#F5F5F5"/>
    <rect x="10" y="32" width="56" height="12" rx="6" fill="#F5F5F5"/>
    <rect x="6"  y="50" width="64" height="12" rx="6" fill="#F5F5F5"/>
  </g>
</svg>
